services:
  postgres:
    image: postgres:16-alpine
    container_name: radius-totp-postgres
    environment:
      POSTGRES_DB: radius_totp
      POSTGRES_USER: radius_totp
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radius_totp -d radius_totp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
